<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÖA Termine 2026 – Caritas St. Pölten</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f8f8f6; font-family: Helvetica, Arial, sans-serif; min-height: 100vh; color: #111; }

  .header { background: #fff; border-bottom: 1.5px solid #e5e7eb; padding: 20px 24px; margin-bottom: 24px; }
  .header-inner { max-width: 1100px; margin: 0 auto; }
  .header-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #9ca3af; text-transform: uppercase; margin-bottom: 4px; }
  .header h1 { font-size: 22px; font-weight: 700; color: #111; }
  .header-meta { font-size: 12px; color: #9ca3af; margin-top: 3px; }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }

  /* Card grid */
  .cards { display: flex; flex-wrap: wrap; gap: 12px; }

  .card { background: #fff; border: 1.5px solid #e5e7eb; border-radius: 14px; padding: 16px 18px; flex: 1 1 300px; min-width: 260px; max-width: 380px; display: flex; flex-direction: column; gap: 10px; }
  .card.overdue  { border-color: #fca5a5; background: #fef2f2; }
  .card.soon     { border-color: #fde68a; background: #fffbeb; }

  /* Date + title */
  .card-top { display: flex; align-items: flex-start; gap: 12px; }
  .card-date { flex-shrink: 0; text-align: center; background: #f3f4f6; border-radius: 8px; padding: 6px 10px; min-width: 54px; }
  .card.overdue .card-date { background: #fee2e2; }
  .card.soon    .card-date { background: #fef3c7; }
  .card-date-day   { font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-date-num   { font-size: 22px; font-weight: 700; color: #111; line-height: 1.1; }
  .card-date-month { font-size: 11px; color: #6b7280; }
  .card.overdue .card-date-day,
  .card.overdue .card-date-num,
  .card.overdue .card-date-month { color: #dc2626; }
  .card.soon .card-date-day,
  .card.soon .card-date-num,
  .card.soon .card-date-month { color: #d97706; }

  .card-title-wrap { flex: 1; min-width: 0; }
  .card-title { font-size: 15px; font-weight: 700; color: #111; line-height: 1.3; }
  .card-weekday { font-size: 11px; color: #9ca3af; margin-top: 2px; }

  /* Fields */
  .card-fields { display: flex; flex-direction: column; gap: 5px; border-top: 1px solid #f3f4f6; padding-top: 10px; }
  .card-field { display: flex; align-items: flex-start; gap: 8px; }
  .card-field-label { font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; min-width: 90px; flex-shrink: 0; padding-top: 1px; }
  .card-field-value { font-size: 13px; color: #374151; line-height: 1.4; flex: 1; }
  .tag { display: inline-block; background: #f3f4f6; border-radius: 6px; padding: 1px 7px; font-size: 12px; color: #374151; }
  .tag.highlight { background: #fef3c7; color: #d97706; }

  .empty { text-align: center; padding: 60px 20px; color: #9ca3af; font-size: 14px; }
  .updated { font-size: 11px; color: #d1d5db; text-align: center; margin-top: 20px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-label">Caritas St. Pölten · Öffentlichkeitsarbeit</div>
    <h1>ÖA Termine 2026</h1>
    <div class="header-meta" id="header-meta">Wird geladen…</div>
  </div>
</div>

<div class="container">
  <div class="cards" id="cards">
    <div class="empty">Termine werden geladen…</div>
  </div>
  <div class="updated" id="updated"></div>
</div>

<script>
const API = "https://projektdashboard-theta.vercel.app/api/termine-public";

const FIELDS = [
  { key: "Ort:",                      label: "Ort" },
  { key: "Channels",                  label: "Channels" },
  { key: "Hauptbereich:",             label: "Hauptbereich" },
  { key: "weitere Bereiche:",         label: "Weitere Bereiche" },
  { key: "Ansprechperson im Bereich:", label: "Ansprechperson" },
  { key: "Fotograf*in:",              label: "Fotograf*in" },
  { key: "Ehrengäste (fix):",         label: "Ehrengäste (fix)" },
  { key: "Ehrengäste (angefragt):",   label: "Ehrengäste (angefragt)" },
];

function dateClass(dateStr) {
  if (!dateStr) return "";
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  const diff = Math.round((d - today) / (1000*60*60*24));
  if (diff < 0) return "overdue";
  if (diff <= 14) return "soon";
  return "";
}

function parsedDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr); d.setHours(12,0,0,0);
  return {
    day:     d.toLocaleDateString("de-AT", { weekday: "short" }),
    num:     d.getDate(),
    month:   d.toLocaleDateString("de-AT", { month: "short" }),
    year:    d.getFullYear(),
    weekday: d.toLocaleDateString("de-AT", { weekday: "long" }),
    full:    d.toLocaleDateString("de-AT", { day:"2-digit", month:"2-digit", year:"numeric" }),
  };
}

function getCustomField(task, fieldName) {
  const fields = task.custom_fields || [];
  const f = fields.find(f => f.name && f.name.trim() === fieldName.trim());
  if (!f) return null;
  return f.display_value || f.text_value || f.enum_value?.name || null;
}

function esc(str) {
  return (str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

async function load() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    const tasks = (data.tasks || []).sort((a,b) => {
      if (a.due_on && b.due_on) return new Date(a.due_on) - new Date(b.due_on);
      if (a.due_on) return -1; if (b.due_on) return 1;
      return a.name.localeCompare(b.name, "de");
    });

    document.getElementById("header-meta").textContent =
      tasks.length + " Termine · Stand: " +
      new Date().toLocaleDateString("de-AT", { day:"2-digit", month:"2-digit", year:"numeric" }) + ", " +
      new Date().toLocaleTimeString("de-AT", { hour:"2-digit", minute:"2-digit" });

    if (tasks.length === 0) {
      document.getElementById("cards").innerHTML = `<div class="empty">Keine offenen Termine gefunden.</div>`;
      return;
    }

    const cards = tasks.map(t => {
      const cls = dateClass(t.due_on);
      const dt = parsedDate(t.due_on);
      const assignee = t.assignee?.name || null;
      const notes = t.notes || null;

      // Date block
      const dateHtml = dt
        ? `<div class="card-date">
            <div class="card-date-day">${esc(dt.day)}</div>
            <div class="card-date-num">${dt.num}</div>
            <div class="card-date-month">${esc(dt.month)} ${dt.year}</div>
           </div>`
        : `<div class="card-date"><div class="card-date-day">–</div></div>`;

      // Collect fields to show (only non-empty)
      const fieldRows = [];

      if (assignee) {
        fieldRows.push(`<div class="card-field">
          <div class="card-field-label">Verantwortlich</div>
          <div class="card-field-value">${esc(assignee)}</div>
        </div>`);
      }

      FIELDS.forEach(({ key, label }) => {
        const val = getCustomField(t, key);
        if (!val || val === "—") return;
        const isTag = val.length < 25;
        const valHtml = isTag
          ? `<span class="tag ${val==='nicht notwendig'?'highlight':''}">${esc(val)}</span>`
          : esc(val);
        fieldRows.push(`<div class="card-field">
          <div class="card-field-label">${esc(label)}</div>
          <div class="card-field-value">${valHtml}</div>
        </div>`);
      });

      if (notes) {
        fieldRows.push(`<div class="card-field">
          <div class="card-field-label">Notizen</div>
          <div class="card-field-value">${esc(notes)}</div>
        </div>`);
      }

      const fieldsHtml = fieldRows.length
        ? `<div class="card-fields">${fieldRows.join("")}</div>` : "";

      return `<div class="card ${cls}">
        <div class="card-top">
          ${dateHtml}
          <div class="card-title-wrap">
            <div class="card-title">${esc(t.name)}</div>
            ${dt ? `<div class="card-weekday">${esc(dt.weekday)}</div>` : ""}
          </div>
        </div>
        ${fieldsHtml}
      </div>`;
    }).join("");

    document.getElementById("cards").innerHTML = cards;
    document.getElementById("updated").textContent =
      "Zuletzt aktualisiert: " + new Date().toLocaleTimeString("de-AT", { hour:"2-digit", minute:"2-digit" });

  } catch(e) {
    document.getElementById("cards").innerHTML = `<div class="empty">Fehler beim Laden der Termine.</div>`;
  }
}

load();
</script>
</body>
</html>
