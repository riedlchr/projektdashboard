<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ehrengäste-Übersicht – Caritas St. Pölten</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f4f8; font-family: Helvetica, Arial, sans-serif; min-height: 100vh; color: #111; }

  /* PIN screen */
  .pin-screen { position: fixed; inset: 0; background: #f0f4f8; display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .pin-box { background: #fff; border-radius: 20px; padding: 36px 32px; max-width: 360px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
  .pin-box .icon { font-size: 40px; margin-bottom: 14px; }
  .pin-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .pin-box p { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
  .pin-input { width: 100%; font-size: 15px; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 11px 14px; font-family: inherit; outline: none; text-align: center; margin-bottom: 10px; transition: border-color 0.15s; }
  .pin-input:focus { border-color: #b91c1c; }
  .pin-btn { width: 100%; padding: 11px; border-radius: 10px; border: none; background: #b91c1c; color: #fff; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; }
  .pin-error { font-size: 12px; color: #b91c1c; margin-top: 8px; min-height: 18px; }

  .header { background: linear-gradient(135deg, #b91c1c 0%, #991b1b 100%); padding: 20px 28px; box-shadow: 0 2px 12px rgba(185,28,28,0.3); margin-bottom: 24px; }
  .header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .header-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: rgba(255,255,255,0.65); text-transform: uppercase; margin-bottom: 2px; }
  .header h1 { font-size: 20px; font-weight: 700; color: #fff; }
  .header-meta { font-size: 12px; color: rgba(255,255,255,0.7); }

  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: #fff; border-radius: 12px; padding: 4px; width: fit-content; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .tab { padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: #9ca3af; font-family: inherit; transition: all 0.15s; }
  .tab.active { background: #b91c1c; color: #fff; box-shadow: 0 2px 6px rgba(185,28,28,0.3); }

  .container { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }

  /* Status colors for names */
  .name-eingeladen  { color: #1d4ed8; font-weight: 700; }
  .name-zugesagt    { color: #15803d; font-weight: 700; }
  .name-abgesagt    { color: #b91c1c; font-weight: 700; }
  .name-ersatz      { color: #b45309; font-weight: 700; }
  .name-vertretung  { color: #15803d; font-weight: 700; }

  .badge { display: inline-block; font-size: 11px; font-weight: 700; border-radius: 20px; padding: 2px 9px; white-space: nowrap; }
  .badge-eingeladen { background: #dbeafe; color: #1d4ed8; }
  .badge-zugesagt   { background: #dcfce7; color: #15803d; }
  .badge-abgesagt   { background: #fee2e2; color: #b91c1c; }
  .badge-ersatz     { background: #fef3c7; color: #b45309; }
  .badge-vertretung { background: #dcfce7; color: #15803d; }

  .events { display: flex; flex-direction: column; gap: 12px; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #9ca3af; text-transform: uppercase; margin: 20px 0 10px; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ""; flex: 1; height: 1px; background: #e5e7eb; }

  .event-card { background: #fff; border: 1.5px solid #e5e7eb; border-radius: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .event-card.past { opacity: 0.7; }
  .event-header { padding: 16px 20px; display: flex; align-items: center; gap: 14px; }
  .event-date-block { flex-shrink: 0; background: #f9fafb; border-radius: 10px; padding: 8px 12px; text-align: center; min-width: 54px; border: 1px solid #e5e7eb; }
  .event-date-num { font-size: 20px; font-weight: 800; color: #111; line-height: 1; }
  .event-date-month { font-size: 10px; color: #6b7280; text-transform: uppercase; }
  .event-info { flex: 1; }
  .event-title { font-size: 15px; font-weight: 700; color: #111; }
  .event-weekday { font-size: 11px; color: #9ca3af; margin-top: 1px; }
  .event-stats { display: flex; gap: 4px; flex-wrap: wrap; }
  .stat { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
  .stat-z { background: #dcfce7; color: #15803d; }
  .stat-a { background: #fee2e2; color: #b91c1c; }
  .stat-e { background: #dbeafe; color: #1d4ed8; }
  .stat-r { background: #fef3c7; color: #b45309; }

  .event-body { border-top: 1px solid #f3f4f6; padding: 14px 20px; }
  .guest-list { display: flex; flex-direction: column; gap: 8px; }
  .guest-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; font-size: 13px; flex-wrap: wrap; }
  .guest-info { display: flex; flex-direction: column; gap: 2px; }
  .guest-note-display { font-size: 11px; color: #9ca3af; font-style: italic; }
  .event-note-display { font-size: 12px; color: #6b7280; font-style: italic; padding: 8px 0 2px; border-top: 1px solid #f3f4f6; margin-top: 8px; }

  .persons { display: flex; flex-wrap: wrap; gap: 10px; }
  .person-card { background: #fff; border: 1.5px solid #e5e7eb; border-radius: 14px; padding: 16px; flex: 1 1 240px; min-width: 200px; max-width: 320px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .person-name { font-size: 14px; font-weight: 700; color: #111; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #f3f4f6; }
  .person-event-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; font-size: 12px; margin-bottom: 5px; }
  .person-event-name { color: #374151; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .person-empty { font-size: 12px; color: #d1d5db; }

  .empty { color: #d1d5db; font-size: 13px; padding: 40px 0; text-align: center; }
  .loading { color: #9ca3af; font-size: 13px; padding: 40px 0; text-align: center; }
  .updated { font-size: 11px; color: #9ca3af; text-align: center; margin-top: 20px; }

  @media (max-width: 600px) { .person-card { flex: 1 1 100%; max-width: 100%; } }
</style>
</head>
<body>

<div class="pin-screen" id="pin-screen">
  <div class="pin-box">
    <div class="icon">🎖️</div>
    <h2>Ehrengäste-Übersicht</h2>
    <p>Caritas St. Pölten · Interner Bereich</p>
    <input class="pin-input" type="password" id="pin-input" placeholder="Zugangscode eingeben" onkeydown="if(event.key==='Enter')checkPin()" autocomplete="off" />
    <button class="pin-btn" onclick="checkPin()">Zugang</button>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<div id="main" style="display:none">
  <div class="header">
    <div class="header-inner">
      <div>
        <div class="header-label">Caritas St. Pölten · Nur lesen</div>
        <h1>🎖️ Ehrengäste-Übersicht</h1>
      </div>
      <div class="header-meta" id="header-meta"></div>
    </div>
  </div>
  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('events')" id="tab-events">📅 Nach Events</button>
      <button class="tab" onclick="switchTab('persons')" id="tab-persons">👤 Nach Personen</button>
    </div>
    <div id="view-events"><div class="loading">Wird geladen…</div></div>
    <div id="view-persons" style="display:none"></div>
    <div class="updated" id="updated"></div>
  </div>
</div>

<script>
const API_READ = "https://projektdashboard-theta.vercel.app/api/einladungen-read";
const CORRECT_PIN = "EinladungEvent26!";
const PIN_KEY = "einladungen_pub_pin";

const STATUS_LABELS = {
  eingeladen: "Eingeladen",
  zugesagt:   "Zugesagt",
  abgesagt:   "Abgesagt",
  ersatz:     "Schickt Ersatz",
  vertretung: "Kommt in Vertretung",
};

let data = { events: [], customPersons: [] };

// ── PIN ───────────────────────────────────────────────────────
function checkPin() {
  const input = document.getElementById("pin-input").value;
  if (input === CORRECT_PIN) {
    localStorage.setItem(PIN_KEY, "1");
    document.getElementById("pin-screen").style.display = "none";
    document.getElementById("main").style.display = "";
    load();
  } else {
    document.getElementById("pin-error").textContent = "Falscher Zugangscode.";
    document.getElementById("pin-input").value = "";
    document.getElementById("pin-input").focus();
  }
}

window.addEventListener("load", () => {
  if (localStorage.getItem(PIN_KEY) === "1") {
    document.getElementById("pin-screen").style.display = "none";
    document.getElementById("main").style.display = "";
    load();
  } else {
    setTimeout(() => document.getElementById("pin-input").focus(), 100);
  }
});

// ── Data ──────────────────────────────────────────────────────
async function load() {
  try {
    const res = await fetch(API_READ);
    data = await res.json();
    if (!data.events) data.events = [];
    if (!data.customPersons) data.customPersons = [];
  } catch(e) {}
  render();
  document.getElementById("header-meta").textContent = data.events.length + " Events";
  document.getElementById("updated").textContent = "Stand: " +
    new Date().toLocaleDateString("de-AT", { day:"2-digit", month:"2-digit", year:"numeric" }) + ", " +
    new Date().toLocaleTimeString("de-AT", { hour:"2-digit", minute:"2-digit" });
}

function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtDate(d) {
  if (!d) return { day:"", month:"", weekday:"" };
  const dt = new Date(d); dt.setHours(12);
  return { day: dt.getDate(), month: dt.toLocaleDateString("de-AT",{month:"short"}), weekday: dt.toLocaleDateString("de-AT",{weekday:"long"}) };
}
function isPast(d) {
  if (!d) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const dt = new Date(d); dt.setHours(0,0,0,0);
  return dt < today;
}

function switchTab(tab) {
  document.getElementById("tab-events").classList.toggle("active", tab==="events");
  document.getElementById("tab-persons").classList.toggle("active", tab==="persons");
  document.getElementById("view-events").style.display = tab==="events" ? "" : "none";
  document.getElementById("view-persons").style.display = tab==="persons" ? "" : "none";
}

function render() { renderEvents(); renderPersons(); }

function renderEventList(list, isPastList) {
  if (!list.length) return isPastList ? "" : '<div class="empty">Noch keine Events angelegt.</div>';
  return list.map(ev => {
    const guests = ev.guests || [];
    const counts = { zugesagt:0, abgesagt:0, eingeladen:0, ersatz:0, vertretung:0 };
    guests.forEach(g => { if(counts[g.status]!==undefined) counts[g.status]++; });
    const positiv = counts.zugesagt + counts.vertretung;
    const dt = fmtDate(ev.date);
    let html = '<div class="event-card'+(isPastList?' past':'')+'">';
    html += '<div class="event-header">';
    if (dt.day) html += '<div class="event-date-block"><div class="event-date-num">'+dt.day+'</div><div class="event-date-month">'+esc(dt.month)+'</div></div>';
    html += '<div class="event-info"><div class="event-title">'+esc(ev.title)+'</div><div class="event-weekday">'+esc(dt.weekday)+'</div></div>';
    html += '<div class="event-stats">';
    if (positiv)           html += '<span class="stat stat-z">✓ '+positiv+'</span>';
    if (counts.abgesagt)   html += '<span class="stat stat-a">✗ '+counts.abgesagt+'</span>';
    if (counts.eingeladen) html += '<span class="stat stat-e">✉ '+counts.eingeladen+'</span>';
    if (counts.ersatz)     html += '<span class="stat stat-r">⇄ '+counts.ersatz+'</span>';
    html += '</div></div>';
    if (guests.length > 0) {
      html += '<div class="event-body"><div class="guest-list">';
      guests.forEach(g => {
        html += '<div class="guest-row">';
        html += '<div class="guest-info"><span class="name-'+g.status+'">'+esc(g.name)+'</span>';
        if (g.note) html += '<span class="guest-note-display">'+esc(g.note)+'</span>';
        html += '</div>';
        html += '<span class="badge badge-'+g.status+'">'+(STATUS_LABELS[g.status]||g.status)+'</span></div>';
      });
      html += '</div>';
      if (ev.note) html += '<div class="event-note-display">📝 '+esc(ev.note)+'</div>';
      html += '</div>';
    } else if (ev.note) {
      html += '<div class="event-body"><div class="event-note-display">📝 '+esc(ev.note)+'</div></div>';
    }
    html += '</div>';
    return html;
  }).join("");
}

function renderEvents() {
  const el = document.getElementById("view-events");
  const sorted = [...data.events].sort((a,b) => {
    if(a.date&&b.date) return new Date(a.date)-new Date(b.date);
    if(a.date) return -1; if(b.date) return 1; return 0;
  });
  const current = sorted.filter(e => !isPast(e.date));
  const past    = sorted.filter(e =>  isPast(e.date));
  let html = '<div class="events">';
  html += renderEventList(current, false);
  if (past.length) {
    html += '<div class="section-label">Archiv</div>';
    html += renderEventList(past, true);
  }
  html += '</div>';
  el.innerHTML = html;
}

function renderPersons() {
  const el = document.getElementById("view-persons");
  const all = [...new Set([...data.events.flatMap(ev=>(ev.guests||[]).map(g=>g.name)), ...(data.customPersons||[])])];
  if (!all.length) { el.innerHTML='<div class="empty">Keine Personen.</div>'; return; }
  const sorted = [...all].sort((a,b) => {
    const aY = data.events.some(ev=>(ev.guests||[]).find(g=>g.name===a&&(g.status==='zugesagt'||g.status==='vertretung')));
    const bY = data.events.some(ev=>(ev.guests||[]).find(g=>g.name===b&&(g.status==='zugesagt'||g.status==='vertretung')));
    if(aY&&!bY) return -1; if(!aY&&bY) return 1; return a.localeCompare(b,'de');
  });
  let html = '<div class="persons">';
  sorted.forEach(person => {
    const apps = data.events
      .filter(ev=>(ev.guests||[]).find(g=>g.name===person))
      .map(ev=>({ title:ev.title, date:ev.date, status:ev.guests.find(g=>g.name===person).status }))
      .sort((a,b)=>{if(a.date&&b.date) return new Date(a.date)-new Date(b.date); return 0;});
    html += '<div class="person-card"><div class="person-name">'+esc(person)+'</div>';
    if (!apps.length) { html += '<div class="person-empty">Noch nicht eingeladen.</div>'; }
    else apps.forEach(a => {
      html += '<div class="person-event-row"><span class="person-event-name">'+esc(a.title)+'</span>';
      html += '<span class="badge badge-'+a.status+'">'+(STATUS_LABELS[a.status]||a.status)+'</span></div>';
    });
    html += '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}
</script>
</body>
</html>
